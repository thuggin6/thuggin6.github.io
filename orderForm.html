<!DOCTYPE html>
<html lang="en">
<head>
   <!-- 
   Filename: orderForm.html
   Supporting files: 
-->
   <title>Tweety Cakes</title>   
   <!-- Metadata of the document -->
   <meta charset="utf-8" />
   <meta name="keywords" content="Cake, food, charlotte, bakery" />
   <meta name="viewport" content="width=device-width, initial-scale=1" />
   <!-- Cascading stylesheet -->
   <link href="formatting.css" rel="stylesheet" />
   <link href="layout.css" rel="stylesheet" />
   <link href="form.css" rel="stylesheet" />
   <!-- Javascript source with a delay to after the page loads -->
   <script src="currentDateTime.js" defer></script>
</head>
<body>
	<header>
		<img src="TweetyCakesLogoRedVelvet.png" alt="Logo" />
		<!-- Navigation list with links -->
		<nav>
			<ul>
				<li><a href="index.html">HOME</a></li>
				<li><a href="OrderMenu.html">CAKE MENU</a></li>
				<li><a href="orderForm.html">ORDER FORM</a></li>
				<li><a href="contactUs.html">CONTACT US</a></li>
			</ul>
		</nav>
	</header>
	<main>
		<body> 
			<h2>Tweety Cakes Order Form</h2>
			<h5>Today's date and time:<span id="pageDateTime"></span></h5>  <!--Add Current date and time to page -->	
			<!--Create the order form -->
			<div class="form-container">
				<form id="order" action="orderform_submit.js" method="post">
					<!--Customer fieldset -->
					<fieldset id="customerInfo">
						<legend>Customer Information</legend>
						<!--Input type: Text -->
						<div class="formRow"> 
							<label for="name">Name*</label>
							<input name="custName" id="name" type="text" required>		<!--Required field  -->					
						</div>			
						
						<div class="formRow"> 
							<label for="street">Street Address</label>
							<input name="custStreet" id="street" type="text">
						</div>
						
						<div class="formRow"> 
							<label for="city">City</label>
							<input name="custCity" id="city" type="text">
						</div>
						
						<div class="formRow"> 
							<label for="state">State</label>
							<input name="custState" id="state" type="text" value="NC">
						</div>
						
						<div class="formRow"> 
							<label for="zip">Postal code</label>
							<input name="custZip" id="zip" type="text" placeholder="nnnnn (-nnnnn)" pattern="^\d{5}(-\d{4})?$" />  <!--Validate datat with patterns --> 
						</div>
						
						<div class="formRow"> 
							<label for="phone">Phone Number</label>
							<input name="custPhone" id="phone" type="tel" placeholder="(nnn) nnn-nnnn"> <!--mobile keyboard for telephone-->
						</div>
						
						<div class="formRow"> 
							<label for="mail">E-mail*</label>
							<input name="custEmail" id="mail"  type="email" required>     <!--Required field set for a mobile keyboard for email-->
						</div>
						
						<!--Input type: selection list -->
						<div class="formRow"> 
							<label for="referral">Where did you hear about us?</label>
							<select name="referralType" id="referral">	
								<option value="referral1">Friends/Family </option>
								<option value="referral2">Flier </option>
								<option value="referral3">Facebook </option>
								<option value="referral4">Other</option>
							</select>
						</div>
					</fieldset>					
					<!--Order fieldset -->
					<fieldset id="orderInfo">
						<legend>Order Information</legend>						
						<div class="formRow"> 
							<!--Input type: date and time -->
							<label for="needed">Date needed:</label>
							<input name="dateNeeded" id="needed" type="datetime-local" />							
						</div>
						
						<!--Data List -->
						<div class="formRow"> 
							<label for="cakeTypeDL">Choose your cake type:</label>
							<input name="cakeType" id="cakeTypeDL" type="text" list="cakeList" />	
							<datalist id="cakeList"> 
								<option value="Red Velvet Cake">
								<option value="Lemon Cake">
								<option value="Chocolate Cake">
								<option value="White Velvet Cake">
							</datalist>
						</div>
						
						<!--Input type: radio buttons -->
						<div class="formRow"> 
							<label>Icing Type:</label>
							<fieldset class="optGroup">
								<label for="buttercream">Butter Cream</label>
								<input name="oIcing" id="buttercream" value = "butter cream" type="radio" />		
								<label for="creamcheese">Cream Cheese</label>
								<input name="oIcing" id="creamcheese" value = "cream cheese" type="radio" />	
							</fieldset>
						</div>
						
						<!--Spinner Control -->
						<div class="formRow"> 
							<label for="cakeNum">How many cakes would you like?</label>
							<input name="totalCakes" id="cakeNum" type="number" value="1" step="1" min="1" max="20" />							
						</div>
						
						<!--Text Area -->
						<label for="requestBox" style="font-weight: bold;">Special Request</label>
						<textarea name="specialRequest" id="requestBox"></textarea>							
						
						
						<!--Input type: Check Boxes -->
						<div class="checkboxRow"> 
							<label for="pickupCB">Pick-up</label>
							<input name="pickup" id="pickupCB" type="checkbox" />		
							<label for="deliveryCB">Delivery</label>
							<input name="delivery" id="deliveryCB" type="checkbox" />	
						</div>
						
						<!--Range Slider -->
						<div class="formRow"> 
							<label for="rangeBox">Rate this form<br /> (0= poor; 10=Excellent)</label>
							1
							<input name="formRating" id="rangeBox" type="range" value="5" step="1" min="0" max="10" />	
							10
						</div>
					</fieldset>
					<!--Submit/Cancel Button -->
						<div class="buttons"> 
							<input type="submit" value="Submit" />	
							<input type="reset" value="Cancel" />
						</div>
				</form>
			</div>
		</body>
	</main>
	<!-- Footer with character references -->
	<footer>&#169Tweety Cakes &#8226; Charlotte NC &nbsp; 28216 &#8226; 980-555-1151 </footer>
</body>

</html>
